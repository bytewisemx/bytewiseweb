<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ByteWise</title>
    <script>
      (function () {
        var path = window.location.pathname || '/';
        var parts = path.split('/').filter(Boolean);
        var isBlogRoute = /\/blog\/?$/.test(path);
        var base = '/';

        if (parts.length > 1) {
          base = '/' + parts[0] + '/';
        }

        if (isBlogRoute) {
          window.location.replace(base + '#/blog');
          return;
        }

        window.location.replace(base);
      })();
    </script>
  </head>
  <body></body>
</html>

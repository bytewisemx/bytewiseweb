        "acceptedAnswer": {
          "@type": "Answer",
          "text": "La norma ISO 27001 es el estándar internacional para la gestión de la seguridad de la información. Su implementación garantiza que la empresa protege la confidencialidad, integridad y disponibilidad de sus datos, reduciendo riesgos de ciberataques y mejorando la confianza de los clientes."

        "acceptedAnswer": {
          "@type": "Answer",

        }

        "@type": "Question",

        "acceptedAnswer": {

        }

        "acceptedAnswer": {
